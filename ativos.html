<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativos — SGE v2</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<style>
  :root{--laranja:#C8670A;--laranja-l:#F4A244;--laranja-bg:#FEF3E8;--dark:#0F172A;--dark2:#1E293B;--bg:#F4EFE6;--branco:#FFFFFF;--cinza:#64748B;--borda:#E2DBD0;--texto:#1A1A1A;--sidebar-w:232px;--radius:10px;--danger:#991B1B;--danger-bg:#FEE2E2;--success:#166534;--success-bg:#DCFCE7;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;}
  .layout{display:flex;min-height:100vh;}
  .sidebar{width:var(--sidebar-w);background:var(--dark);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
  .sidebar-header{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;}
  .s-title{font-size:14px;font-weight:700;}.s-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}
  .sidebar-nav{flex:1;padding:12px 0;}
  .nav-section{padding:0 12px;margin-bottom:4px;}
  .nav-section-title{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:.8px;text-transform:uppercase;padding:8px 8px 4px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:rgba(255,255,255,.65);font-size:14px;cursor:pointer;transition:all .15s;text-decoration:none;margin-bottom:2px;}
  .nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
  .nav-item.ativo{background:var(--laranja);color:#fff;}
  .nav-item i{font-size:17px;flex-shrink:0;}
  .sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.08);}
  .user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.05);}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--laranja);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
  .u-nome{font-size:13px;font-weight:600;color:#fff;}.u-perfil{font-size:11px;color:rgba(255,255,255,.4);}
  .btn-sair{display:flex;align-items:center;gap:6px;margin-top:8px;padding:8px 12px;border-radius:8px;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;width:100%;background:none;border:none;transition:all .15s;}
  .btn-sair:hover{background:rgba(255,255,255,.07);color:#fff;}
  .conteudo{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
  .topbar{background:var(--branco);border-bottom:1px solid var(--borda);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .topbar-esq{display:flex;align-items:center;gap:8px;}
  .topbar-titulo{font-size:16px;font-weight:600;color:var(--dark);}
  .breadcrumb{font-size:13px;color:var(--cinza);}
  .breadcrumb a{color:var(--laranja);text-decoration:none;}
  .badge-perfil{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--laranja-bg);color:var(--laranja);}
  .pagina{padding:28px;flex:1;}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .toolbar-esq{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap;}
  .busca-wrap{position:relative;}
  .busca-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--cinza);font-size:15px;pointer-events:none;}
  .input-busca{padding:8px 14px 8px 36px;border:1.5px solid var(--borda);border-radius:var(--radius);font-size:13px;outline:none;background:var(--branco);width:240px;transition:border .2s;color:var(--texto);}
  .input-busca:focus{border-color:var(--laranja);}
  .select-filtro{padding:8px 12px;border:1.5px solid var(--borda);border-radius:var(--radius);font-size:13px;outline:none;background:var(--branco);color:var(--texto);cursor:pointer;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
  .btn-primary{background:var(--laranja);color:#fff;}.btn-primary:hover{background:#a5530a;}
  .btn-outline{background:var(--branco);color:var(--dark);border:1.5px solid var(--borda);}.btn-outline:hover{border-color:var(--laranja);color:var(--laranja);}
  .btn-danger{background:var(--danger-bg);color:var(--danger);}.btn-danger:hover{background:#fca5a5;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
  .kpi{background:var(--branco);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--borda);}
  .kpi-valor{font-size:26px;font-weight:700;color:var(--dark);}
  .kpi-label{font-size:12px;color:var(--cinza);margin-top:2px;}
  .kpi-icon{font-size:18px;color:var(--laranja);margin-bottom:6px;}
  .tabela-wrap{background:var(--branco);border-radius:var(--radius);border:1px solid var(--borda);overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead tr{background:var(--dark);color:#fff;}
  thead th{padding:11px 14px;text-align:left;font-weight:600;font-size:12px;letter-spacing:.3px;white-space:nowrap;}
  tbody tr{border-top:1px solid var(--borda);transition:background .1s;}
  tbody tr:hover{background:#FAF7F2;}
  tbody tr:nth-child(even){background:var(--bg);}
  tbody tr:nth-child(even):hover{background:#F0EBE1;}
  tbody td{padding:10px 14px;vertical-align:middle;}
  .td-nome{font-weight:500;color:var(--dark);}.td-mono{font-family:monospace;font-size:12px;color:var(--cinza);}.td-cinza{color:var(--cinza);}
  .badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
  .badge-ativo{background:var(--success-bg);color:var(--success);}
  .badge-inativo{background:var(--danger-bg);color:var(--danger);}
  .badge-info{background:#DBEAFE;color:#1E40AF;}
  .badge-aviso{background:#FEF9C3;color:#854D0E;}
  .tipo-icon{display:inline-flex;align-items:center;gap:5px;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-bg.aberto{display:flex;}
  .modal{background:var(--branco);border-radius:14px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.25);animation:modalIn .2s ease;}
  @keyframes modalIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;}
  .modal-titulo{font-size:16px;font-weight:700;color:var(--dark);}
  .modal-fechar{background:none;border:none;cursor:pointer;color:var(--cinza);font-size:20px;padding:4px;border-radius:6px;}
  .modal-fechar:hover{background:var(--bg);color:var(--dark);}
  .modal-body{padding:24px;}.modal-footer{padding:16px 24px;border-top:1px solid var(--borda);display:flex;justify-content:flex-end;gap:10px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .campo{display:flex;flex-direction:column;gap:5px;}.campo.span2{grid-column:span 2;}
  .campo label{font-size:12px;font-weight:600;color:var(--dark);}
  .campo input,.campo select,.campo textarea{padding:9px 12px;border:1.5px solid var(--borda);border-radius:8px;font-size:13px;color:var(--texto);background:var(--bg);outline:none;transition:border .2s;font-family:inherit;}
  .campo input:focus,.campo select:focus,.campo textarea:focus{border-color:var(--laranja);background:var(--branco);}
  .campo textarea{resize:vertical;min-height:72px;}
  .detalhe-row{display:flex;gap:6px;margin-bottom:8px;font-size:13px;}
  .detalhe-label{font-weight:600;color:var(--dark);min-width:130px;flex-shrink:0;}
  .detalhe-val{color:var(--cinza);}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <i class="ti ti-bolt" style="color:var(--laranja);font-size:26px;flex-shrink:0"></i>
      <div><div class="s-title">SGE v2</div><div class="s-sub">Grupo Energia</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Principal</div>
        <a class="nav-item" href="index.html"><i class="ti ti-layout-dashboard"></i> Painel</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Módulos</div>
        <a class="nav-item" href="efetivos.html"><i class="ti ti-users"></i> Efetivos</a>
        <a class="nav-item" href="alojamentos.html"><i class="ti ti-building"></i> Alojamentos</a>
        <a class="nav-item ativo" id="nav-ativos" href="ativos.html"><i class="ti ti-truck"></i> Ativos</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Cadastros</div>
        <a class="nav-item" href="index.html" onclick="sessionStorage.setItem('sge_goto','colaboradores')"><i class="ti ti-id-badge"></i> Colaboradores</a>
        <a class="nav-item" href="index.html" onclick="sessionStorage.setItem('sge_goto','obras')"><i class="ti ti-building-skyscraper"></i> Obras</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="user-avatar">--</div>
        <div><div class="u-nome" id="user-nome">—</div><div class="u-perfil" id="user-perfil">—</div></div>
      </div>
      <button class="btn-sair" onclick="Auth.logout()"><i class="ti ti-logout"></i> Sair</button>
    </div>
  </aside>

  <main class="conteudo">
    <div class="topbar">
      <div class="topbar-esq">
        <span class="breadcrumb"><a href="index.html">Painel</a> /</span>
        <span class="topbar-titulo">Ativos Operacionais</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-outline" onclick="recarregar()"><i class="ti ti-refresh"></i> Atualizar</button>
        <span class="badge-perfil" id="topbar-perfil">—</span>
      </div>
    </div>

    <div class="pagina">
      <div class="kpis">
        <div class="kpi"><i class="ti ti-package kpi-icon"></i><div class="kpi-valor" id="kpi-total">—</div><div class="kpi-label">Total de ativos</div></div>
        <div class="kpi"><i class="ti ti-check kpi-icon"></i><div class="kpi-valor" id="kpi-ativos">—</div><div class="kpi-label">Em operação</div></div>
        <div class="kpi"><i class="ti ti-truck kpi-icon"></i><div class="kpi-valor" id="kpi-veiculos">—</div><div class="kpi-label">Veículos</div></div>
        <div class="kpi"><i class="ti ti-settings kpi-icon"></i><div class="kpi-valor" id="kpi-equip">—</div><div class="kpi-label">Equipamentos</div></div>
      </div>

      <div class="toolbar">
        <div class="toolbar-esq">
          <div class="busca-wrap">
            <i class="ti ti-search"></i>
            <input class="input-busca" id="busca" placeholder="Buscar ativo ou obra..." oninput="filtrar()">
          </div>
          <select class="select-filtro" id="filtro-tipo" onchange="filtrar()">
            <option value="">Todos os tipos</option>
            <option value="Veículo">Veículo</option>
            <option value="Equipamento">Equipamento</option>
          </select>
          <select class="select-filtro" id="filtro-obra" onchange="filtrar()"><option value="">Todas as obras</option></select>
          <select class="select-filtro" id="filtro-status" onchange="filtrar()">
            <option value="">Todos os status</option>
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="abrirModalNovo()"><i class="ti ti-plus"></i> Novo Ativo</button>
      </div>

      <div id="tabela-wrap">
        <div style="text-align:center;padding:48px;color:var(--cinza)">
          <i class="ti ti-loader-2" style="font-size:28px;animation:spin 1s linear infinite"></i>
          <p style="margin-top:12px">Carregando ativos...</p></div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL ATIVO -->
<div class="modal-bg" id="modal-bg" onclick="fecharModalSeFora(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-titulo" id="modal-titulo">Novo Ativo</span>
      <button class="modal-fechar" onclick="fecharModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="campo span2">
          <label>Descrição *</label>
          <input type="text" id="f-desc" placeholder="ex: Caminhão Munck, Gerador 150kVA...">
        </div>
        <div class="campo">
          <label>Tipo *</label>
          <select id="f-tipo">
            <option value="">Selecione...</option>
            <option value="Veículo">Veículo</option>
            <option value="Equipamento">Equipamento</option>
          </select>
        </div>
        <div class="campo">
          <label>Placa / Série</label>
          <input type="text" id="f-placa" placeholder="ex: ABC-1234 ou GER-0045">
        </div>
        <div class="campo span2">
          <label>Obra</label>
          <select id="f-obra"><option value="">Sem obra alocada</option></select>
        </div>
        <div class="campo span2">
          <label>Responsável (Colaborador)</label>
          <select id="f-responsavel"><option value="">Sem responsável</option></select>
        </div>
        <div class="campo">
          <label>Data de Alocação</label>
          <input type="date" id="f-data">
        </div>
        <div class="campo">
          <label>Status</label>
          <select id="f-status">
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
          </select>
        </div>
        <div class="campo span2">
          <label>Observações</label>
          <textarea id="f-obs" placeholder="Manutenção pendente, observações..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar" onclick="salvar()"><i class="ti ti-check"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHES -->
<div class="modal-bg" id="modal-detalhe-bg" onclick="fecharDetalhe(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-titulo">Detalhes do Ativo</span>
      <button class="modal-fechar" onclick="fecharDetalhe()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="modal-detalhe-body"></div>
    <div class="modal-footer" id="modal-detalhe-footer"></div>
  </div>
</div>

<script>
let _ativos = [], _colaboradores = [], _obras = [], _modoEdicao = null;

window.addEventListener('DOMContentLoaded', async () => {
  const s = Auth.exigirLogin();
  if (!s) return;
  if (s.perfil !== 'Administrador') { window.location.href = 'index.html'; return; }
  document.getElementById('user-nome').textContent    = s.nome;
  document.getElementById('user-perfil').textContent  = s.perfil;
  document.getElementById('user-avatar').textContent  = Fmt.iniciais(s.nome);
  document.getElementById('topbar-perfil').textContent= s.perfil;
  await carregarTudo();
});

async function carregarTudo() {
  const [ativos, cols, obras] = await Promise.all([
    Sheets.fetch(SGE.ABAS.ATIVOS, true),
    Sheets.fetch(SGE.ABAS.COLABORADORES, true),
    Sheets.fetch(SGE.ABAS.OBRAS, true),
  ]);
  _ativos = ativos; _colaboradores = cols.filter(c=>c.STATUS==='Ativo'); _obras = obras.filter(o=>o.STATUS!=='Concluído');
  popularFiltroObra(); popularSelectsModal(); atualizarKPIs(); renderTabela(_ativos);
}

async function recarregar() { Sheets.limparCache(); await carregarTudo(); Toast.info('Dados atualizados.'); }

function atualizarKPIs() {
  const ativos  = _ativos.filter(a=>a.STATUS==='Ativo');
  document.getElementById('kpi-total').textContent   = _ativos.length;
  document.getElementById('kpi-ativos').textContent  = ativos.length;
  document.getElementById('kpi-veiculos').textContent= ativos.filter(a=>a.TIPO==='Veículo').length;
  document.getElementById('kpi-equip').textContent   = ativos.filter(a=>a.TIPO==='Equipamento').length;
}

function popularFiltroObra() {
  const sel = document.getElementById('filtro-obra');
  sel.innerHTML = '<option value="">Todas as obras</option>';
  [...new Set(_ativos.map(a=>a.NOME_OBRA).filter(Boolean))].sort().forEach(o=>{
    const opt=document.createElement('option');opt.value=o;opt.textContent=o;sel.appendChild(opt);
  });
}

function popularSelectsModal() {
  const sO=document.getElementById('f-obra'), sR=document.getElementById('f-responsavel');
  sO.innerHTML='<option value="">Sem obra alocada</option>';
  sR.innerHTML='<option value="">Sem responsável</option>';
  _obras.forEach(o=>{const opt=document.createElement('option');opt.value=o.ID;opt.textContent=o.NOME;sO.appendChild(opt);});
  _colaboradores.forEach(c=>{const opt=document.createElement('option');opt.value=c.ID;opt.textContent=c.NOME;sR.appendChild(opt);});
}

function filtrar() {
  const b=document.getElementById('busca').value.toLowerCase();
  const t=document.getElementById('filtro-tipo').value;
  const o=document.getElementById('filtro-obra').value;
  const s=document.getElementById('filtro-status').value;
  renderTabela(_ativos.filter(a=>{
    const mb=!b||a.DESCRICAO.toLowerCase().includes(b)||(a.NOME_OBRA||'').toLowerCase().includes(b)||(a.PLACA_SERIE||'').toLowerCase().includes(b);
    return mb&&(!t||a.TIPO===t)&&(!o||a.NOME_OBRA===o)&&(!s||a.STATUS===s);
  }));
}

const TIPO_ICON = { 'Veículo':'ti-truck', 'Equipamento':'ti-settings' };

function renderTabela(dados) {
  const wrap=document.getElementById('tabela-wrap');
  if (!dados.length) {
    wrap.innerHTML=`<div style="text-align:center;padding:48px;color:var(--cinza)"><i class="ti ti-inbox" style="font-size:36px;opacity:.4"></i><p style="margin-top:12px;font-size:15px;font-weight:500">Nenhum ativo encontrado.</p></div>`;
    return;
  }
  wrap.innerHTML=`<div class="tabela-wrap"><table>
    <thead><tr><th>Descrição</th><th>Tipo</th><th>Placa / Série</th><th>Obra</th><th>Responsável</th><th>Alocação</th><th style="text-align:center">Status</th><th style="text-align:center">Ações</th></tr></thead>
    <tbody>${dados.map(a=>`<tr>
      <td><div class="td-nome">${a.DESCRICAO}</div><div class="td-mono">${a.ID}</div></td>
      <td><span class="tipo-icon"><i class="ti ${TIPO_ICON[a.TIPO]||'ti-package'}" style="color:var(--laranja)"></i>${a.TIPO||'—'}</span></td>
      <td class="td-mono">${a.PLACA_SERIE||'—'}</td>
      <td class="td-cinza">${a.NOME_OBRA||'—'}</td>
      <td class="td-cinza">${a.NOME_COLABORADOR||'—'}</td>
      <td class="td-cinza">${Fmt.data(a.DATA_ALOCACAO)}</td>
      <td style="text-align:center">${Fmt.statusBadge(a.STATUS)}</td>
      <td style="text-align:center">
        <div style="display:flex;gap:6px;justify-content:center">
          <button class="btn btn-outline" style="padding:5px 8px" onclick="verDetalhe('${a.ID}')"><i class="ti ti-eye" style="font-size:14px"></i></button>
          <button class="btn btn-outline" style="padding:5px 8px" onclick="abrirModalEdicao('${a.ID}')"><i class="ti ti-edit" style="font-size:14px"></i></button>
        </div>
      </td>
    </tr>`).join('')}</tbody></table>
    <div style="padding:10px 14px;font-size:12px;color:var(--cinza);border-top:1px solid var(--borda)">${dados.length} registro${dados.length!==1?'s':''} exibido${dados.length!==1?'s':''}</div>
  </div>`;
}

function abrirModalNovo() {
  _modoEdicao=null;
  document.getElementById('modal-titulo').textContent='Novo Ativo';
  ['f-desc','f-tipo','f-placa','f-obra','f-responsavel','f-data','f-obs'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('f-status').value='Ativo';
  document.getElementById('f-data').value=new Date().toISOString().split('T')[0];
  document.getElementById('modal-bg').classList.add('aberto');
}

function abrirModalEdicao(id) {
  const a=_ativos.find(x=>x.ID===id); if(!a) return;
  _modoEdicao=id;
  document.getElementById('modal-titulo').textContent='Editar Ativo';
  document.getElementById('f-desc').value       = a.DESCRICAO||'';
  document.getElementById('f-tipo').value       = a.TIPO||'';
  document.getElementById('f-placa').value      = a.PLACA_SERIE||'';
  document.getElementById('f-obra').value       = a.ID_OBRA||'';
  document.getElementById('f-responsavel').value= a.ID_COLABORADOR||'';
  document.getElementById('f-data').value       = a.DATA_ALOCACAO||'';
  document.getElementById('f-status').value     = a.STATUS||'Ativo';
  document.getElementById('f-obs').value        = a.OBS||'';
  document.getElementById('modal-bg').classList.add('aberto');
}

function fecharModal(){document.getElementById('modal-bg').classList.remove('aberto');}
function fecharModalSeFora(e){if(e.target===document.getElementById('modal-bg'))fecharModal();}

async function salvar() {
  const desc = document.getElementById('f-desc').value.trim();
  const tipo = document.getElementById('f-tipo').value;
  if (!desc||!tipo){Toast.aviso('Preencha Descrição e Tipo.');return;}
  const idObra=document.getElementById('f-obra').value;
  const idResp=document.getElementById('f-responsavel').value;
  const obra=_obras.find(o=>o.ID===idObra);
  const resp=_colaboradores.find(c=>c.ID===idResp);
  const btn=document.getElementById('btn-salvar');
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Salvando...';
  const novoId=_modoEdicao||('ATI'+String(Date.now()).slice(-6));
  const dados={
    ID:novoId, DESCRICAO:desc, TIPO:tipo,
    PLACA_SERIE:document.getElementById('f-placa').value,
    ID_OBRA:idObra, NOME_OBRA:obra?obra.NOME:'',
    ID_COLABORADOR:idResp, NOME_COLABORADOR:resp?resp.NOME:'',
    STATUS:document.getElementById('f-status').value,
    DATA_ALOCACAO:document.getElementById('f-data').value,
    OBS:document.getElementById('f-obs').value,
  };
  const payload=_modoEdicao?{acao:'ATUALIZAR',aba:'Ativos',id:_modoEdicao,dados}:{acao:'INSERIR',aba:'Ativos',dados};
  const res=await GAS.post(payload);
  btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Salvar';
  if(res.ok){fecharModal();Toast.sucesso('Ativo salvo!');Sheets.limparCache();await carregarTudo();}
  else Toast.erro('Erro: '+(res.mensagem||'Tente novamente.'));
}

function verDetalhe(id) {
  const a=_ativos.find(x=>x.ID===id); if(!a) return;
  document.getElementById('modal-detalhe-body').innerHTML=`
    <div style="display:grid;gap:10px">
      <div class="detalhe-row"><span class="detalhe-label">ID</span><span class="detalhe-val td-mono">${a.ID}</span></div>
      <div class="detalhe-row"><span class="detalhe-label">Descrição</span><span class="detalhe-val"><strong>${a.DESCRICAO}</strong></span></div>
      <div class="detalhe-row"><span class="detalhe-label">Tipo</span><span class="detalhe-val">${a.TIPO||'—'}</span></div>
      <div class="detalhe-row"><span class="detalhe-label">Placa / Série</span><span class="detalhe-val td-mono">${a.PLACA_SERIE||'—'}</span></div>
      <div class="detalhe-row"><span class="detalhe-label">Obra</span><span class="detalhe-val">${a.NOME_OBRA||'—'}</span></div>
      <div class="detalhe-row"><span class="detalhe-label">Responsável</span><span class="detalhe-val">${a.NOME_COLABORADOR||'—'}</span></div>
      <div class="detalhe-row"><span class="detalhe-label">Data Alocação</span><span class="detalhe-val">${Fmt.data(a.DATA_ALOCACAO)}</span></div>
      <div class="detalhe-row"><span class="detalhe-label">Status</span><span class="detalhe-val">${Fmt.statusBadge(a.STATUS)}</span></div>
      ${a.OBS?`<div class="detalhe-row"><span class="detalhe-label">Observações</span><span class="detalhe-val">${a.OBS}</span></div>`:''}
    </div>`;
  document.getElementById('modal-detalhe-footer').innerHTML=`
    <button class="btn btn-outline" onclick="fecharDetalhe()">Fechar</button>
    <button class="btn btn-primary" onclick="fecharDetalhe();abrirModalEdicao('${a.ID}')"><i class="ti ti-edit"></i> Editar</button>`;
  document.getElementById('modal-detalhe-bg').classList.add('aberto');
}
function fecharDetalhe(e){
  if(e&&e.target!==document.getElementById('modal-detalhe-bg'))return;
  document.getElementById('modal-detalhe-bg').classList.remove('aberto');
}
</script>
